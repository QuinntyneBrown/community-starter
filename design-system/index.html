<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community Starter design system</title>
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="base.css" />
  </head>
  <body>
    <a class="cs-skip-link" href="#main">Skip to content</a>
    <main id="main" class="cs-shell" style="padding-block: var(--cs-space-8)">
      <p class="cs-eyebrow">Canonical foundations</p>
      <h1 style="font-size: var(--cs-step-display); max-width: 12ch">
        Build community with care.
      </h1>
      <p style="font-size: var(--cs-step-1); max-width: 48ch">
        Shared foundations keep every public, member, moderator, and
        administrative journey clear.
      </p>
      <div style="display: flex; flex-wrap: wrap; gap: var(--cs-space-3)">
        <button class="cs-button" type="button">Primary action</button>
        <button class="cs-button cs-button--secondary" type="button">
          Secondary action
        </button>
      </div>
    </main>
  </body>
</html>
