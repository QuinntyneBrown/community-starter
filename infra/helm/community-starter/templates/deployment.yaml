apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: community-starter
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: community-starter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: community-starter
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: community-starter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Runtime__Role
              value: {{ .Values.runtime.role | quote }}
            - name: Migration__ApplyOnStartup
              value: {{ .Values.runtime.applyMigrations | quote }}
            - name: ConnectionStrings__Community
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.connectionStringSecret }}
                  key: {{ .Values.runtime.connectionStringKey }}
            - name: Security__TokenPepper
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtime.tokenPepperSecret }}
                  key: {{ .Values.runtime.tokenPepperKey }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
