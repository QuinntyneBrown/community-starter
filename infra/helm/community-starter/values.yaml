replicaCount: 1

image:
  repository: ghcr.io/example/community-starter
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  port: 80

runtime:
  role: all
  applyMigrations: false
  connectionStringSecret: community-starter-secrets
  connectionStringKey: connection-string
  tokenPepperSecret: community-starter-secrets
  tokenPepperKey: token-pepper

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
